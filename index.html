<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAGE9 영업 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg-base: #ffffff;
    --bg-raised: #ffffff;
    --bg-surface: #ffffff;
    --bg-overlay: #f6f5f4;
    --border-subtle: rgba(0,0,0,0.1);
    --border-default: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text-primary: rgba(0,0,0,0.95);
    --text-secondary: #615d59;
    --text-tertiary: #a39e98;
    --text-quaternary: #a39e98;
    --brand: #FF5A00;
    --brand-soft: rgba(255,90,0,.06);
    --brand-mid: rgba(255,90,0,.12);
    --accent: #FF5A00;
    --accent-soft: rgba(255,90,0,.06);
    --green: #2a9d99;
    --green-soft: rgba(42,157,153,.08);
    --red: #dd5b00;
    --red-soft: rgba(221,91,0,.08);
    --blue: #0075de;
    --blue-soft: rgba(0,117,222,.08);
    --amber: #dd5b00;
    --amber-soft: rgba(221,91,0,.08);
    --pink: #391c57;
    --cyan: #2a9d99;
    --radius-sm: 12px;
    --radius-md: 12px;
    --radius-lg: 12px;
    --shadow-card: rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.027) 0px 2px 8px, rgba(0,0,0,0.02) 0px 1px 3px;
    --shadow-hover: rgba(0,0,0,0.06) 0px 4px 18px, rgba(0,0,0,0.04) 0px 2px 8px, rgba(0,0,0,0.03) 0px 1px 3px;
    --transition: 200ms ease;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',-apple-system,system-ui,'Segoe UI',Roboto,'Helvetica Neue',sans-serif; background:var(--bg-base); color:var(--text-primary); min-height:100vh; -webkit-font-smoothing:antialiased; line-height:1.50; }

  /* HEADER */
  .header { padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border-subtle); background:#ffffff; position:sticky; top:0; z-index:100; }
  .header-left { display:flex; align-items:center; gap:16px; }
  .logo { display:flex; align-items:center; gap:0; }
  .header-divider { width:1px; height:24px; background:var(--border-default); }
  .header-title { font-size:14px; font-weight:500; color:var(--text-secondary); }
  .header-right { display:flex; align-items:center; gap:12px; }
  .month-select { appearance:none; background:var(--bg-overlay); border:1px solid var(--border-default); color:var(--text-primary); padding:8px 34px 8px 14px; border-radius:8px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer; transition:all var(--transition); background-image:url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 4.5L6 7.5L9 4.5' stroke='%236a6a6a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 12px center; }
  .month-select:hover { border-color:var(--border-strong); background:#f2f2f2; }
  .month-select:focus { outline:none; border-color:var(--text-primary); box-shadow:0 0 0 2px var(--text-primary); }
  .update-badge { font-size:12px; color:var(--text-tertiary); padding:6px 12px; background:var(--bg-overlay); border-radius:20px; }

  /* TABS */
  .tab-nav { display:flex; gap:4px; padding:0 32px; background:#ffffff; border-bottom:1px solid var(--border-subtle); }
  .tab-btn { padding:16px 4px; border:none; background:transparent; color:#615d59; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer; transition:color var(--transition); position:relative; margin-bottom:-1px; margin-right:20px; }
  .tab-btn:hover { color:rgba(0,0,0,0.95); }
  .tab-btn.active { color:rgba(0,0,0,0.95); font-weight:600; }
  .tab-btn.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:#FF5A00; border-radius:2px 2px 0 0; }

  /* MAIN */
  .main { padding:28px 32px 48px; max-width:1440px; margin:0 auto; }
  .tab-content { display:none; animation:fadeIn .3s ease; }
  .tab-content.active { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }

  /* CARDS */
  .metric-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  .metric-card { background:#ffffff; border:1px solid rgba(0,0,0,0.1); border-radius:var(--radius-sm); padding:24px; transition:transform var(--transition),box-shadow var(--transition); box-shadow:var(--shadow-card); }
  .metric-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-hover); }
  .metric-label { font-size:13px; font-weight:500; color:var(--text-secondary); margin-bottom:12px; }
  .metric-value { font-size:32px; font-weight:700; letter-spacing:-0.5px; line-height:1.18; margin-bottom:8px; font-variant-numeric:tabular-nums; }
  .metric-unit { font-size:16px; font-weight:500; color:var(--text-tertiary); margin-left:2px; }
  .metric-sub { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-secondary); }
  .pill { display:inline-flex; align-items:center; gap:3px; padding:3px 10px; border-radius:9999px; font-size:12px; font-weight:600; }
  .pill-up { background:rgba(42,157,153,0.08); color:#2a9d99; }
  .pill-down { background:rgba(221,91,0,0.08); color:#dd5b00; }
  .pill-neutral { background:rgba(0,117,222,0.08); color:#0075de; }

  /* PANELS */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  .grid-full { margin-bottom:16px; }
  .panel { background:#ffffff; border:1px solid rgba(0,0,0,0.1); border-radius:var(--radius-sm); padding:24px; transition:transform var(--transition),box-shadow var(--transition); box-shadow:var(--shadow-card); }
  .panel:hover { box-shadow:var(--shadow-hover); }
  .panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .panel-title { font-size:16px; font-weight:700; color:var(--text-primary); display:flex; align-items:center; gap:8px; letter-spacing:-0.25px; }
  .panel-dot { width:6px; height:6px; border-radius:50%; }
  .product-row { display:flex; align-items:center; gap:16px; padding:14px 0; border-top:1px solid var(--border-subtle); }
  .product-label-col { width:72px; font-size:13px; font-weight:600; flex-shrink:0; }
  .product-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .product-pct { font-size:18px; }
  .product-sub { font-size:11px; color:var(--text-quaternary); }
  .product-gap { font-size:11px; color:var(--text-quaternary); margin-top:4px; }
  .product-bar-track { width:100%; height:8px; background:var(--bg-overlay); border-radius:4px; overflow:hidden; position:relative; }
  .product-bar-fill { height:100%; border-radius:4px; transition:width .6s ease; }

  /* BRANCH BARS */
  .branch-item { display:flex; align-items:center; gap:14px; padding:16px 0; }
  .branch-item + .branch-item { border-top:1px solid var(--border-subtle); }
  .branch-label { width:88px; font-size:14px; font-weight:600; flex-shrink:0; }
  .bar-wrap { flex:1; }
  .bar-track { width:100%; height:8px; background:#f6f5f4; border-radius:4px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; transition:width .8s cubic-bezier(.4,0,.2,1); }
  .bar-meta { display:flex; justify-content:space-between; font-size:12px; color:var(--text-tertiary); margin-top:6px; }
  .branch-pct { width:64px; text-align:right; font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; flex-shrink:0; }

  /* TABLE */
  .data-table { width:100%; border-collapse:collapse; font-size:14px; font-variant-numeric:tabular-nums; }
  .data-table th { text-align:left; padding:12px 16px; font-size:12px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--border-default); }
  .data-table td { padding:14px 16px; border-bottom:1px solid var(--border-subtle); color:var(--text-primary); }
  .data-table tbody tr:last-child td { border-bottom:none; }
  .data-table tbody tr { transition:background var(--transition); }
  .data-table tbody tr:hover td { background:#f6f5f4; }
  .data-table .num { text-align:right; }
  .data-table .row-total td { background:rgba(255,90,0,.04); color:var(--text-primary); font-weight:600; border-bottom:none; }

  /* CHARTS */
  .chart-wrap { position:relative; width:100%; height:280px; }
  .chart-wrap-sm { position:relative; width:100%; height:220px; }
  .chart-wrap-lg { position:relative; width:100%; height:340px; }

  /* RANKINGS */
  .rank-row { display:flex; align-items:center; gap:12px; padding:14px 0; }
  .rank-row + .rank-row { border-top:1px solid var(--border-subtle); }
  .rank-badge { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
  .rb-1 { background:#FF5A00; color:#fff; }
  .rb-2 { background:#31302e; color:#fff; }
  .rb-3 { background:#615d59; color:#fff; }
  .rb-4 { background:#f6f5f4; color:var(--text-secondary); border:1px solid rgba(0,0,0,0.1); }
  .rank-info { flex:1; }
  .rank-name { font-size:14px; font-weight:600; }
  .rank-sub { font-size:12px; color:var(--text-tertiary); margin-top:2px; }
  .rank-val { font-size:17px; font-weight:700; font-variant-numeric:tabular-nums; }

  /* BRANCH TABS */
  .branch-tabs { display:flex; gap:4px; margin-bottom:24px; background:#f6f5f4; padding:4px; border-radius:10px; width:fit-content; }
  .branch-tab { padding:8px 18px; background:transparent; border:none; color:var(--text-secondary); border-radius:8px; cursor:pointer; font-size:14px; font-weight:500; font-family:inherit; transition:all var(--transition); }
  .branch-tab:hover { color:var(--text-primary); background:rgba(0,0,0,.04); }
  .branch-tab.active { background:#ffffff; color:var(--text-primary); font-weight:600; box-shadow:var(--shadow-card); }

  /* FUNNEL */
  .funnel-item { display:flex; align-items:center; gap:16px; padding:16px; border-radius:var(--radius-sm); margin-bottom:6px; }
  .funnel-item:nth-child(1) { background:rgba(255,90,0,.04); border-left:3px solid var(--brand); }
  .funnel-item:nth-child(2) { background:rgba(66,139,255,.04); border-left:3px solid #428bff; }
  .funnel-item:nth-child(3) { background:rgba(0,138,5,.04); border-left:3px solid #008A05; }
  .funnel-val { font-size:26px; font-weight:700; width:56px; letter-spacing:-1px; }
  .funnel-label { font-size:14px; color:var(--text-secondary); }
  .funnel-rate { font-size:12px; color:var(--text-tertiary); margin-top:2px; }

  .section-label { font-size:12px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px; margin-top:12px; }

  /* 태블릿 */
  @media (max-width:1100px) {
    .metric-grid { grid-template-columns:repeat(2,1fr); }
    .grid-2 { grid-template-columns:1fr; }
  }

  /* 모바일 */
  @media (max-width:640px) {
    .metric-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
    .main { padding:16px; }
    .header { padding:0 12px; height:56px; }
    .header-title { display:none; }
    .header-divider { display:none; }
    .header-right { gap:8px; }
    .month-select { font-size:12px; padding:6px 30px 6px 10px; }
    .update-badge { display:none; }
    .tab-nav { padding:0 12px; gap:0; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .tab-btn { font-size:12px; padding:14px 2px; margin-right:16px; white-space:nowrap; }
    .metric-card { padding:14px; }
    .metric-value { font-size:23px; }
    .metric-unit { font-size:12px; }
    .metric-label { font-size:11px; margin-bottom:8px; }
    .metric-sub { font-size:10px; }
    .panel { padding:16px; border-radius:10px; }
    .panel-title { font-size:13px; }
    .branch-tabs { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .branch-tab { flex:1; text-align:center; font-size:12px; padding:8px 10px; white-space:nowrap; }
    .branch-label { width:56px; font-size:11px; }
    .branch-pct { font-size:12px; }
    .bar-meta { font-size:10px; }
    .data-table { font-size:11px; }
    .data-table th { padding:8px 8px; font-size:9px; }
    .data-table td { padding:10px 8px; }
    .rank-name { font-size:12px; }
    .rank-val { font-size:14px; }
    .rank-badge { width:24px; height:24px; font-size:11px; }
    .rank-row { gap:10px; padding:12px 0; }
    .chart-wrap,.chart-wrap-lg { height:200px; }
    .chart-wrap-sm { height:180px; }
    .grid-2 { gap:12px; }
    .grid-full { margin-bottom:12px; }
    .funnel-val { font-size:21px; }
    .funnel-label { font-size:11px; }
    .section-label { font-size:10px; }
    .panel-header { margin-bottom:16px; }

    /* 테이블 가로 스크롤 + 힌트 그라데이션 */
    .table-scroll {
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      margin:0 -16px;
      padding:0 16px;
      background:
        linear-gradient(to right, white 30%, rgba(255,255,255,0)),
        linear-gradient(to left, white 30%, rgba(255,255,255,0)) 100% 0,
        linear-gradient(to right, rgba(0,0,0,.05), rgba(0,0,0,0)),
        linear-gradient(to left, rgba(0,0,0,.05), rgba(0,0,0,0)) 100% 0;
      background-size: 40px 100%, 40px 100%, 14px 100%, 14px 100%;
      background-repeat: no-repeat;
      background-attachment: local, local, scroll, scroll;
    }
    .table-scroll .data-table { min-width:580px; white-space:nowrap; }
    .table-scroll .product-scroll-inner { min-width:400px; }

    /* 상품별 목표 달성 - 가로스크롤이므로 원본 크기 유지 */
  }

  /* 작은 모바일 */
  @media (max-width:380px) {
    .metric-grid { grid-template-columns:1fr; }
    .metric-value { font-size:26px; }
    .header { gap:8px; }
    .month-select { font-size:11px; padding:5px 26px 5px 8px; }
    .tab-btn { font-size:11px; margin-right:12px; }
    .branch-tabs { flex-wrap:nowrap; }
    .branch-tab { font-size:11px; padding:7px 8px; }
  }
</style>
</head>

<div class="header">

      <span style="color:#fff;font-family:Impact,'Arial Narrow Bold','Arial Black',sans-serif;font-weight:900;font-size:9px;letter-spacing:.3px;line-height:1">STAGE9</span>

    <div class="header-title">전 지점 영업 현황</div>

</div>

<div class="tab-nav">

</div>

<div class="main">

  <div id="overview" class="tab-content active">
    <div class="metric-grid" id="overviewCards"></div>

      <div class="panel"><div class="panel-header"><div class="panel-title"><span class="panel-dot" style="background:var(--brand)"></span>지점별 달성률</div></div><div id="branchBars"></div></div>
      <div class="panel"><div class="panel-header"><div class="panel-title"><span class="panel-dot" style="background:var(--green)"></span>상품별 매출 비중</div></div><div class="chart-wrap"><canvas id="productPieChart"></canvas></div></div>
    </div>
    <!-- 상세 현황 먼저 -->
    <div class="grid-full">
      <div class="panel"><div class="panel-header"><div class="panel-title"><span class="panel-dot" style="background:var(--amber)"></span>상세 현황</div></div><div id="detailTable"></div></div>
    </div>

      <div class="panel"><div class="panel-header"><div class="panel-title"><span class="panel-dot" style="background:var(--accent)"></span>오피스 · 비상주 매출 추이</div></div><div class="chart-wrap"><canvas id="trendChart1"></canvas></div></div>
      <div class="panel"><div class="panel-header"><div class="panel-title"><span class="panel-dot" style="background:var(--amber)"></span>다이브나인 · 대관 매출 추이</div></div><div class="chart-wrap"><canvas id="trendChart2"></canvas></div></div>
    </div>
    <div class="grid-full" id="funnelOverview"></div>
  </div>

  <!-- TAB 2: 지점별 -->
  <div id="detail" class="tab-content">
    <div class="branch-tabs" id="branchSelector"></div>
    <div id="branchDetailContent"></div>
  </div>

  <!-- TAB 3: 비교 -->
  <div id="compare" class="tab-content">
    <div class="grid-2">

      <div class="panel" id="rankPanel"></div>
    </div>
    <div class="grid-full">
      <div class="panel"><div class="panel-header"><div class="panel-title"><span class="panel-dot" style="background:var(--pink)"></span>전년 동월 비교</div></div><div id="yoyTable"></div></div>
    </div>
    <div class="grid-full">
      <div class="panel"><div class="panel-header"><div class="panel-title"><span class="panel-dot" style="background:var(--amber)"></span>전월 비교</div></div><div id="momTable"></div></div>
    </div>
  </div>
</div>

// Helpers
const f=n=>n.toLocaleString('ko-KR');
const eokS=n=>(n/1e8).toFixed(1);

function smartUnit(n){return n>=1e8?eokS(n)+'억':manW(n)+'만';}
function smartUnitFull(n){return manW(n)+'만원';}
function pill(v){if(v>0)return`<span class="pill pill-up">\u25B2 ${Math.abs(v).toFixed(1)}%</span>`;if(v<0)return`<span class="pill pill-down">\u25BC ${Math.abs(v).toFixed(1)}%</span>`;return`<span class="pill pill-neutral">0.0%</span>`;}
function cv(v){if(v>0)return`<span style="color:var(--green)">\u25B2 ${Math.abs(v).toFixed(1)}%</span>`;if(v<0)return`<span style="color:var(--red)">\u25BC ${Math.abs(v).toFixed(1)}%</span>`;return`<span style="color:var(--text-tertiary)">0.0%</span>`;}
function achColor(v){return v>=100?'var(--green)':v>=95?'var(--green)':v>=90?'var(--amber)':'var(--red)';}
function funnelColor(v,type){if(type==='tourRate')return v>=30?'var(--green)':v>=20?'var(--amber)':'var(--red)';if(type==='leadContract')return v>=15?'var(--green)':v>=10?'var(--amber)':'var(--red)';if(type==='tourContract')return v>=50?'var(--green)':v>=30?'var(--amber)':'var(--red)';return 'var(--text-secondary)';}

function renderBranch(b){
  const d=gd(),r=d[b],t=TGT[b],label=ml(),el=document.getElementById('branchDetailContent');

  // 월별 테이블 빌더 (신규/재계약)

    let tbl=`<div class="panel"><div class="panel-header"><div class="panel-title"><span class="panel-dot" style="background:${dotColor}"></span>${title}</div></div>`;

      prev=cur;

    tbl+=`</tbody></table></div></div>`;

  // ROW 1: 상품별 목표 달성 + 비상주 월별
  h+=`<div class="grid-2">`;

  products.forEach(p=>{
    if(p.hasTarget){

      h+=`<div class="product-row">
        <div class="product-label-col">${p.name}</div>
        <div style="flex:1">
          <div class="product-header">
            <span class="product-pct" style="font-weight:700;color:${achColor(pct)}">${pct.toFixed(1)}%</span>

          </div>
          <div class="product-bar-track">
            <div class="product-bar-fill" style="width:${Math.min(pct,100)}%;background:${p.color}"></div>
            ${pct<100?`<div style="position:absolute;right:0;top:0;height:100%;width:2px;background:var(--border-strong)"></div>`:''}
          </div>
          <div class="product-gap">${gap>=0?'<span style=color:var(--green)>+'+manW(gap)+'만 초과</span>':'<span style=color:var(--red)>'+manW(gap)+'만 부족</span>'}</div>
        </div>
      </div>`;
    } else {
      h+=`<div class="product-row">
        <div class="product-label-col">${p.name}</div>
        <div style="flex:1">
          <div class="product-header">
            <span class="product-pct" style="font-weight:700;color:var(--text-primary)">${manW(p.actual)}<span style="font-size:13px;color:var(--text-tertiary);font-weight:500">만원</span></span>
          </div>
        </div>
      </div>`;
    }
  });
  h+=`</div></div></div>`;
  // 비상주 월별
  h+=buildTable('비상주 월별','var(--green)','vt','vn','vr',t.virtual);
  h+=`</div>`;

  // ROW 2: 다이브나인 월별 + 대관 월별
  h+=`<div class="grid-2">`;
  h+=buildTable('다이브나인 월별','var(--amber)','dv','dn','dr',t.dive);
  h+=buildRentalTable();
  h+=`</div>`;

  // 영업 퍼널 (오피스)
  h+=`<div class="grid-full"><div class="panel"><div class="panel-header"><div class="panel-title"><span class="panel-dot" style="background:var(--cyan)"></span>영업 퍼널 (오피스)</div></div>`;
  h+=`<div class="table-scroll"><table class="data-table"><thead><tr><th>월</th><th class="num">리드 수</th><th class="num">투어 수</th><th class="num">투어율</th><th class="num">계약 수</th><th class="num">리드→계약</th><th class="num">투어→계약</th></tr></thead><tbody>`;
  MONTH_KEYS.forEach(m=>{
    const x=MD[m][b];
    if(x.lead===0){
      h+=`<tr><td>${m.slice(5).replace(/^0/,'')}월</td><td class="num">-</td><td class="num">-</td><td class="num">-</td><td class="num">-</td><td class="num">-</td><td class="num">-</td></tr>`;
    } else {
      const tourRate=(x.tour/x.lead*100),leadContract=(x.contract/x.lead*100),tourContract=x.tour>0?(x.contract/x.tour*100):0;
      h+=`<tr><td>${m.slice(5).replace(/^0/,'')}월</td><td class="num">${x.lead}</td><td class="num">${x.tour}</td><td class="num"><span style="color:${funnelColor(tourRate,'tourRate')};font-weight:600">${tourRate.toFixed(1)}%</span></td><td class="num">${x.contract}</td><td class="num"><span style="color:${funnelColor(leadContract,'leadContract')};font-weight:600">${leadContract.toFixed(1)}%</span></td><td class="num"><span style="color:${funnelColor(tourContract,'tourContract')};font-weight:600">${tourContract.toFixed(1)}%</span></td></tr>`;
    }
  });
  h+=`</tbody></table></div></div></div>`;

  el.innerHTML=h;
}

function renderCompare(){
  const d=gd(),label=ml(),mm=document.getElementById('yearMonth').value.split('-')[1];

  dc('compareBarChart');
  charts['compareBarChart']=new Chart(document.getElementById('compareBarChart'),{type:'bar',data:{labels:BRANCHES.map(b=>BN[b]),datasets:[
    {label:'오피스',data:BRANCHES.map(b=>d[b].office),backgroundColor:CP.office,borderRadius:6,barPercentage:.65},
    {label:'비상주',data:BRANCHES.map(b=>d[b].vt),backgroundColor:CP.virtual,borderRadius:6,barPercentage:.65},
    {label:'다이브나인',data:BRANCHES.map(b=>d[b].dv),backgroundColor:CP.dive,borderRadius:6,barPercentage:.65},
    {label:'대관',data:BRANCHES.map(b=>d[b].rt),backgroundColor:CP.rental,borderRadius:6,barPercentage:.65}
  ]},options:cOpts({scales:{x:{stacked:true,grid:{display:false},ticks:{color:CP.tick}},y:{stacked:true,ticks:{callback:v=>f(Math.round(v/1e4))+'만',color:CP.tick},grid:{color:CP.grid}}},plugins:{legend:{position:'top'}}})});

  const as=[...BRANCHES].sort((a,b)=>d[b].ar-d[a].ar);
  const ps=[...BRANCHES].sort((a,b)=>d[b].up-d[a].up);
  const rc=['rb-1','rb-2','rb-3','rb-4'];

  let rh=`<div class="panel-header"><div class="panel-title"><span class="panel-dot" style="background:var(--green)"></span>달성률 순위 (${label})</div></div>`;
  as.forEach((b,i)=>{rh+=`<div class="rank-row"><div class="rank-badge ${rc[i]}">${i+1}</div><div class="rank-info"><div class="rank-name">${BN[b]}</div><div class="rank-sub">목표 ${manW(TGT[b].total)}만 · 실적 ${manW(d[b].total)}만</div></div><div class="rank-val" style="color:${achColor(d[b].ar)}">${d[b].ar.toFixed(1)}%</div></div>`;});
  rh+=`<div class="section-label" style="margin-top:20px">객단가 순위</div>`;
  ps.forEach((b,i)=>{rh+=`<div class="rank-row"><div class="rank-badge ${rc[i]}">${i+1}</div><div class="rank-info"><div class="rank-name">${BN[b]}</div></div><div class="rank-val">${f(d[b].up)}</div></div>`;});
  document.getElementById('rankPanel').innerHTML=rh;

  if(YOY[mm]){
    const prev=YOY[mm];
    let yh=`<div class="table-scroll"><table class="data-table"><thead><tr><th>지점</th><th class="num">2025 ${label}</th><th class="num">2026 ${label}</th><th class="num">증감률</th><th class="num">증감액</th></tr></thead><tbody>`;
    BRANCHES.forEach(b=>{const df=(d[b].total-prev[b])/prev[b]*100,da=d[b].total-prev[b];yh+=`<tr><td><strong>${BN[b]}</strong></td><td class="num">${f(prev[b])}</td><td class="num">${f(d[b].total)}</td><td class="num">${cv(df)}</td><td class="num" style="color:${da>=0?'var(--green)':'var(--red)'}">${da>=0?'+':''}${f(da)}</td></tr>`;});
    const tp=BRANCHES.reduce((s,b)=>s+prev[b],0),tc=BRANCHES.reduce((s,b)=>s+d[b].total,0),td=(tc-tp)/tp*100;
    yh+=`<tr class="row-total"><td>전 지점</td><td class="num">${f(tp)}</td><td class="num">${f(tc)}</td><td class="num">${cv(td)}</td><td class="num" style="color:${tc-tp>=0?'var(--green)':'var(--red)'}">${tc-tp>=0?'+':''}${f(tc-tp)}</td></tr></tbody></table></div>`;
    document.getElementById('yoyTable').innerHTML=yh;
  }

  // 전월 비교
  const mi=MONTH_KEYS.indexOf(document.getElementById('yearMonth').value);
  if(mi>0){
    const prevM=MONTH_KEYS[mi-1], curM=document.getElementById('yearMonth').value;
    const pd=MD[prevM], cd=MD[curM];
    const prevLabel=prevM.slice(5).replace(/^0/,'')+'월', curLabel=curM.slice(5).replace(/^0/,'')+'월';
    let mh=`<div class="table-scroll"><table class="data-table"><thead><tr><th>지점</th><th class="num">${prevLabel}</th><th class="num">${curLabel}</th><th class="num">증감률</th><th class="num">증감액</th></tr></thead><tbody>`;
    BRANCHES.forEach(b=>{const df=(cd[b].total-pd[b].total)/pd[b].total*100,da=cd[b].total-pd[b].total;mh+=`<tr><td><strong>${BN[b]}</strong></td><td class="num">${f(pd[b].total)}</td><td class="num">${f(cd[b].total)}</td><td class="num">${cv(df)}</td><td class="num" style="color:${da>=0?'var(--green)':'var(--red)'}">${da>=0?'+':''}${f(da)}</td></tr>`;});
    const tp2=BRANCHES.reduce((s,b)=>s+pd[b].total,0),tc2=BRANCHES.reduce((s,b)=>s+cd[b].total,0),td2=(tc2-tp2)/tp2*100;
    mh+=`<tr class="row-total"><td>전 지점</td><td class="num">${f(tp2)}</td><td class="num">${f(tc2)}</td><td class="num">${cv(td2)}</td><td class="num" style="color:${tc2-tp2>=0?'var(--green)':'var(--red)'}">${tc2-tp2>=0?'+':''}${f(tc2-tp2)}</td></tr></tbody></table></div>`;
    document.getElementById('momTable').innerHTML=mh;
  } else {
    document.getElementById('momTable').innerHTML='<div style="color:var(--text-tertiary);font-size:13px;padding:12px">비교할 전월 데이터가 없습니다.</div>';
  }
}

// ====== INIT ======
Chart.defaults.color='#615d59';
Chart.defaults.borderColor='rgba(0,0,0,.06)';
Chart.defaults.font.family="'Inter',-apple-system,BlinkMacSystemFont,sans-serif";
Chart.defaults.font.size=12;

function renderAll(){renderOverview();renderDetail();renderCompare();}

function switchTab(tabId){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  const btn=document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
  if(btn)btn.classList.add('active');
  document.getElementById(tabId)?.classList.add('active');
}

document.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{
  switchTab(btn.dataset.tab);
  localStorage.setItem('s9-tab',btn.dataset.tab);
  if(btn.dataset.tab==='detail'){const ab=document.querySelector('.branch-tab.active');if(ab)localStorage.setItem('s9-branch',ab.dataset.branch);}
});});

document.getElementById('yearMonth').addEventListener('change',function(){
  localStorage.setItem('s9-month',this.value);
  renderAll();
});

// 저장된 월 복원
(function(){const sm=localStorage.getItem('s9-month');if(sm){const sel=document.getElementById('yearMonth');if(sel.querySelector(`option[value="${sm}"]`)){sel.value=sm;}}})();

const now=new Date();document.getElementById('updateDate').textContent='업데이트 '+now.getFullYear()+'.'+(''+(now.getMonth()+1)).padStart(2,'0')+'.'+(''+now.getDate()).padStart(2,'0');
renderAll();

// 새로고침 시 탭 + 지점 + 월 복원
(function(){
  const tab=localStorage.getItem('s9-tab');
  if(tab&&document.getElementById(tab)){
    switchTab(tab);
    if(tab==='detail'){
      const br=localStorage.getItem('s9-branch');
      if(br&&BRANCHES.includes(br)){
        const sel=document.getElementById('branchSelector');
        sel.querySelectorAll('.branch-tab').forEach(x=>x.classList.remove('active'));
        const target=sel.querySelector(`[data-branch="${br}"]`);
        if(target)target.classList.add('active');
        renderBranch(br);
      }
    }
  }
})();
</script>
